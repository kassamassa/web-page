<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職業図鑑：異能者編 | Loading...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --primary: #5FA870;
  --accent:  #C8A040;
  --chalk:   #EDE4C8;
  --dim:     #7A7060;
  --red:     #CC3333;
  --black:   #06060A;
}
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--black);
  color:var(--chalk);
  font-family:'Noto Serif JP', serif;
}

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:999;
  display:flex; align-items:center; justify-content:center;
  background:var(--black); transition:opacity 0.6s;
}
#loading span {
  font-family:'Space Mono',monospace; font-size:0.65rem;
  letter-spacing:0.4em; color:var(--primary);
}
#loading.hidden { opacity:0; pointer-events:none; }

/* ── SCROLL CONTAINER ── */
#scroll-container {
  position:fixed; inset:0; z-index:10;
  overflow-y:scroll; overflow-x:hidden;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}
#scroll-container::-webkit-scrollbar { width:0; }

/* ── SLIDES WRAPPER ── */
#slides { width:100%; }

/* ── SLIDE BASE ── */
.slide {
  position:relative; width:100%; height:100vh;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; text-align:center;
  overflow:hidden;
  scroll-snap-align:start; scroll-snap-stop:always;
  background:var(--black);
}

/* scanlines */
.slide::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px);
}

/* ── UI ── */
#progress {
  position:fixed; top:0; left:0; height:2px; z-index:200; width:0%;
  transition:width 0.1s;
}
#slide-num {
  position:fixed; bottom:2rem; right:2rem;
  font-family:'Space Mono',monospace; font-size:0.6rem;
  letter-spacing:0.3em; color:var(--dim); z-index:200;
}
#scroll-hint {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:0.4rem;
  z-index:200; transition:opacity 0.5s;
}
#scroll-hint span {
  font-family:'Space Mono',monospace; font-size:0.5rem;
  letter-spacing:0.35em; color:var(--primary);
}
.scroll-bar {
  width:1px; height:36px;
  background:linear-gradient(to bottom, var(--primary), transparent);
}

/* ════════════════════════════
   SCENE BACKGROUNDS
════════════════════════════ */

/* S0: 星空 */
.bg-stars {
  position:absolute; inset:0; z-index:0; overflow:hidden;
}
.bg-stars canvas { position:absolute; inset:0; width:100%; height:100%; }

/* S1: 壁 */
.bg-wall {
  position:absolute; inset:0; z-index:0;
  background: #080C0A;
}
.wall-blocks {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(95,168,112,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(95,168,112,0.06) 1px, transparent 1px);
  background-size: 12.5% 10%;
}
.wall-glow {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 40%, rgba(61,107,74,0.15), transparent 70%);
}

/* S2: ワイヤー網 */
.bg-wire {
  position:absolute; inset:0; z-index:0; background:#040810;
}
.bg-wire canvas { position:absolute; inset:0; width:100%; height:100%; }

/* S3: 夜明け */
.bg-dawn {
  position:absolute; inset:0; z-index:0;
  background:linear-gradient(180deg,
    #04060A 0%, #0A1520 45%, #1A2810 55%, #2A1A08 65%, #06060A 100%);
}
.dawn-horizon {
  position:absolute; left:0; right:0; top:55%;
  height:2px;
  background:linear-gradient(to right, transparent, var(--accent), transparent);
  filter:blur(1px);
}
.dawn-glow {
  position:absolute; left:50%; top:55%; transform:translate(-50%,-50%);
  width:80vw; height:40vh;
  background:radial-gradient(ellipse, rgba(200,160,64,0.15), transparent 70%);
}

/* S4: 暗闇×刃 */
.bg-blade {
  position:absolute; inset:0; z-index:0; background:#060408;
}
.blade-glow {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 50%, rgba(80,10,10,0.2), transparent 70%);
}
.bg-blade canvas { position:absolute; inset:0; width:100%; height:100%; }

/* S5: 黒板 */
.bg-board {
  position:absolute; inset:0; z-index:0;
  background:radial-gradient(ellipse 80% 70% at 50% 50%, #0D1F12, #060A06);
}
.board-lines {
  position:absolute; inset:0;
  background-image:repeating-linear-gradient(
    transparent, transparent calc(12.5% - 1px), rgba(180,200,160,0.07) calc(12.5% - 1px), rgba(180,200,160,0.07) 12.5%
  );
}

/* ════════════════════════════
   KINETIC TEXT ELEMENTS
════════════════════════════ */

/* 共通 */
.z-content { position:relative; z-index:2; }

/* S0 */
.s0-bg-text {
  position:absolute; z-index:1;
  font-family:'Cinzel',serif; font-weight:900;
  font-size:40vw; line-height:1;
  color:rgba(95,168,112,0.04);
  white-space:nowrap;
  pointer-events:none;
  top:50%; left:50%; transform:translate(-50%,-50%);
  letter-spacing:-0.05em;
}

.s-classify {
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.45em; color:var(--red);
  border:1px solid rgba(204,51,51,0.4); padding:0.35rem 1.2rem;
  margin-bottom:2rem; text-transform:uppercase;
  position:relative; z-index:2; opacity:0;
}
.wings-svg {
  display:block; width:80px; margin:0 auto 1.5rem;
  opacity:0; position:relative; z-index:2;
  filter:drop-shadow(0 0 16px rgba(95,168,112,0.7));
}
.s0-en {
  font-family:'Cinzel',serif;
  font-size:clamp(5rem,18vw,14rem);
  font-weight:900; line-height:1.1;
  letter-spacing:-0.02em; color:var(--chalk);
  position:relative; z-index:2; opacity:0;
  transform-origin:center center;
}
.s0-ja {
  font-family:'Noto Serif JP',serif;
  font-size:clamp(0.8rem,2.2vw,1.3rem);
  font-weight:300; letter-spacing:0.65em;
  color:var(--primary); margin-top:1.2rem;
  position:relative; z-index:2; opacity:0;
}
.s0-vow {
  font-family:'Cinzel',serif;
  font-size:clamp(0.6rem,1.4vw,0.8rem);
  letter-spacing:0.25em; color:var(--accent);
  margin-top:2rem; position:relative; z-index:2; opacity:0;
}

/* S1 */
.s1-scene {
  position:relative; z-index:2;
  width:100%; padding:0 5vw;
}
.s1-label {
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.4em; color:var(--primary);
  position:absolute; top:3rem; left:3rem;
  opacity:0; z-index:2;
}
.s1-kinetic {
  font-family:'Cinzel',serif;
  font-size:clamp(4rem,13vw,11rem);
  font-weight:900; line-height:0.9;
  color:var(--chalk); overflow:hidden;
  transform-origin:left center;
}
.s1-kinetic .line {
  display:block; overflow:hidden;
}
.s1-kinetic .line-inner {
  display:block; transform:translateY(110%);
}
.s1-kinetic .accent { color:var(--primary); }
.s1-sub {
  margin-top:2.5rem; font-size:clamp(0.82rem,1.8vw,1rem);
  line-height:2.4; color:var(--dim); max-width:560px;
  margin-left:auto; margin-right:auto;
  opacity:0; transform:translateY(30px);
}
.s1-sub strong { color:var(--chalk); }
.s1-sub .corps { color:var(--primary); }
.s1-sub .danger { color:var(--red); }

/* S2 */
#s2 { align-items:stretch; justify-content:flex-start; }
.s2-header {
  display:flex; align-items:baseline; gap:1.5rem;
  padding:3rem 3rem 2rem;
  border-bottom:1px solid rgba(95,168,112,0.2);
  opacity:0; position:relative; z-index:2;
}
.s2-eyebrow {
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.4em; color:var(--primary);
}
.s2-title {
  font-family:'Cinzel',serif; font-size:clamp(1rem,3vw,1.8rem);
  font-weight:900; color:var(--chalk); letter-spacing:0.1em;
}
.s2-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  flex:1; gap:1px;
  background:rgba(95,168,112,0.08);
  border:1px solid rgba(95,168,112,0.15);
  margin:0 3rem 3rem; position:relative; z-index:2;
}
.sk {
  background:rgba(6,6,10,0.7); padding:1.8rem;
  position:relative; overflow:hidden;
  opacity:0; transform:scale(0.85) translateZ(-50px);
  transition:background 0.3s; backdrop-filter:blur(8px);
}
.sk:hover { background:rgba(61,107,74,0.1); }
.sk::before {
  content:''; position:absolute; top:0; right:0;
  width:28px; height:28px;
  border-top:1px solid var(--primary);
  border-right:1px solid var(--primary); opacity:0.4;
}
.sk-num { font-family:'Cinzel',serif; font-size:2rem; font-weight:900; color:rgba(95,168,112,0.08); position:absolute; bottom:0.5rem; right:1rem; line-height:1; }
.sk-tag { font-family:'Space Mono',monospace; font-size:0.5rem; letter-spacing:0.3em; color:var(--primary); margin-bottom:0.5rem; }
.sk-name { font-family:'Cinzel',serif; font-size:clamp(0.7rem,1.5vw,0.88rem); font-weight:700; color:var(--chalk); margin-bottom:0.15rem; line-height:1.3; }
.sk-ja { font-family:'Space Mono',monospace; font-size:0.58rem; color:var(--accent); margin-bottom:0.8rem; }
.sk-body { font-size:clamp(0.68rem,1.2vw,0.78rem); line-height:1.9; color:var(--dim); }
.sk-body em { color:var(--chalk); font-style:normal; }
.sk-body .danger { color:var(--red); }
.sk-body .corps { color:var(--primary); }

/* S3 */
.s3-label {
  position:absolute; top:3rem; left:3rem;
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.4em; color:var(--primary);
  opacity:0; z-index:2;
}

/* ── S3 タイムライン：冒険ログ全画面 ── */
#s3 {
  align-items:stretch;
  justify-content:center;
  padding:6rem 0 0;
}
.tl-wrap {
  width:100%;
  max-width:none;
  margin:0;
  padding:0;
  position:relative; z-index:2;
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex:1;
}
.tl-wrap::before { display:none; }

.tl-row {
  display:grid;
  grid-template-columns:12rem 1fr;
  gap:0;
  padding:0.6rem 4rem;
  border-bottom:1px solid rgba(123,158,255,0.06);
  opacity:0; transform:translateX(-40px);
  align-items:center;
  transition:background 0.3s;
}
.tl-row:hover {
  background:rgba(123,158,255,0.03);
}

.tl-t {
  font-family:'Space Mono',monospace;
  font-size:clamp(0.75rem,1.5vw,1rem);
  color:rgba(123,158,255,0.5);
  letter-spacing:0.1em;
  text-align:right;
  padding-right:3rem;
  border-right:1px solid rgba(123,158,255,0.15);
}

.tl-content {
  padding-left:3rem;
  display:flex;
  align-items:baseline;
  gap:2rem;
}

.tl-head {
  font-family:'Noto Serif JP',serif;
  font-size:clamp(1.4rem,3.5vw,2.5rem);
  font-weight:700; color:var(--chalk);
  letter-spacing:0.1em;
  white-space:nowrap;
  text-shadow:0 0 20px rgba(255,208,96,0.15);
  flex-shrink:0;
}

.tl-body {
  font-size:clamp(0.75rem,1.4vw,0.9rem);
  line-height:1.5; color:var(--dim);
  letter-spacing:0.05em;
}
.tl-body strong { color:var(--chalk); }
.tl-body .danger { color:var(--red); }
.tl-body .corps { color:var(--primary); }

/* S3背景：ログライン縦線を左側に */
.bg-tensura-s3 {
  position:absolute; inset:0; z-index:0;
  background:linear-gradient(180deg, #04040E 0%, #080820 50%, #04040E 100%);
}
.log-lines {
  position:absolute; inset:0;
  background-image:
    linear-gradient(90deg, transparent 12rem, rgba(123,158,255,0.06) 12rem, rgba(123,158,255,0.06) calc(12rem + 1px), transparent calc(12rem + 1px));
}

/* S4 */
.s4-label {
  position:absolute; top:3rem; left:3rem;
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.4em; color:var(--primary);
  opacity:0; z-index:2;
}
.req-stack { width:100%; max-width:680px; position:relative; z-index:2; }
.req-row {
  display:flex; gap:1.5rem;
  border:1px solid rgba(61,107,74,0.2);
  padding:1.4rem 1.8rem; margin-bottom:1px;
  position:relative; opacity:0; transform:translateX(50px);
  backdrop-filter:blur(6px); background:rgba(6,6,10,0.6);
}
.req-row::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, rgba(61,107,74,0.06), transparent);
  pointer-events:none;
}
.req-num { font-family:'Cinzel',serif; font-size:1.4rem; font-weight:900; color:var(--primary); flex-shrink:0; width:1.8rem; text-align:center; line-height:1.1; text-shadow:0 0 14px rgba(95,168,112,0.4); }
.req-head { font-family:'Cinzel',serif; font-size:0.76rem; color:var(--chalk); letter-spacing:0.12em; margin-bottom:0.4rem; }
.req-body { font-size:0.76rem; line-height:2; color:var(--dim); }
.req-body strong { color:var(--chalk); }
.req-body .danger { color:var(--red); }
.req-body .corps { color:var(--primary); }
.req-kinetic {
  margin-top:2.5rem;
  font-family:'Cinzel',serif;
  font-size:clamp(1.5rem,5vw,3.5rem);
  font-weight:900; color:var(--primary);
  letter-spacing:0.1em; opacity:0;
  position:relative; z-index:2;
  transform:scale(0.5);
  text-shadow:0 0 40px rgba(95,168,112,0.4);
}

/* S5 */
.s5-bg-text {
  position:absolute; z-index:1;
  font-family:'Cinzel',serif; font-weight:900;
  font-size:35vw; line-height:1;
  color:rgba(95,168,112,0.03);
  white-space:nowrap; pointer-events:none;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.s5-pre {
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.45em; color:var(--primary);
  text-transform:uppercase; opacity:0;
  margin-bottom:1.5rem; position:relative; z-index:2;
}
.s5-body {
  font-size:clamp(0.82rem,1.6vw,0.95rem); line-height:2.6;
  color:var(--dim); max-width:460px; opacity:0;
  position:relative; z-index:2; margin-bottom:2.5rem;
}
.s5-body strong { color:var(--chalk); }
.s5-body .danger { color:var(--red); }
.s5-big {
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,5.5vw,4.5rem);
  font-weight:900; color:var(--chalk);
  filter:drop-shadow(0 0 60px rgba(95,168,112,0.4));
  opacity:0; position:relative; z-index:2; line-height:1;
  transform-origin:center center;
}
.s5-ja {
  font-family:'Space Mono',monospace;
  font-size:clamp(0.65rem,1.8vw,0.9rem);
  color:var(--primary); letter-spacing:0.3em;
  text-shadow:0 0 12px rgba(95,168,112,0.5);
  opacity:0; margin-top:0.5rem; position:relative; z-index:2;
}
.s5-wings { opacity:0; margin:1.2rem 0; position:relative; z-index:2; }
.s5-vow {
  font-family:'Cinzel',serif;
  font-size:clamp(0.62rem,1.4vw,0.8rem);
  color:var(--accent); letter-spacing:0.2em;
  font-style:italic; opacity:0;
  margin-top:0.8rem; position:relative; z-index:2;
}
.s5-next {
  margin-top:2rem; display:inline-flex; align-items:center; gap:0.8rem;
  border:1px solid rgba(95,168,112,0.25); padding:0.8rem 1.8rem;
  font-family:'Space Mono',monospace; font-size:0.55rem;
  letter-spacing:0.25em; color:var(--dim); text-transform:uppercase;
  opacity:0; position:relative; z-index:2; text-decoration:none;
  transition:border-color 0.3s;
}
.s5-next:hover { border-color:var(--primary); color:var(--chalk); }
.s5-next::before { content:'▶'; color:var(--primary); }

/* tag styles */
.tag-corps { color:var(--primary); }
.tag-danger { color:var(--red); }

@media(max-width:768px){ .s2-grid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:500px){ .s2-grid{ grid-template-columns:1fr; } }

/* ════════════════════════════
   TENSURA THEME BACKGROUNDS
════════════════════════════ */

/* S0: 異世界転生シーン（光の柱・粒子） */
.bg-tensura-s0 {
  position:absolute; inset:0; z-index:0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%,
    rgba(123,158,255,0.15) 0%, transparent 65%),
    linear-gradient(180deg, #04040E 0%, #080820 60%, #04040E 100%);
}
.bg-tensura-s0 canvas { position:absolute; inset:0; width:100%; height:100%; }

/* S2: ステータス画面風 */
.bg-tensura-s2 {
  position:absolute; inset:0; z-index:0;
  background: #030310;
}
.status-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(123,158,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,158,255,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
}
.status-glow {
  position:absolute; inset:0;
  background: radial-gradient(ellipse 70% 50% at 50% 50%,
    rgba(123,158,255,0.08), transparent 70%);
}

/* S3: 冒険ログ風 */
.bg-tensura-s3 {
  position:absolute; inset:0; z-index:0;
  background: linear-gradient(180deg, #04040E 0%, #0A0820 50%, #04040E 100%);
}
.log-lines {
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    transparent, transparent calc(16.6% - 1px),
    rgba(123,158,255,0.05) calc(16.6% - 1px),
    rgba(123,158,255,0.05) 16.6%
  );
}
.log-glow {
  position:absolute; left:5.5rem; top:0; bottom:0; width:1px;
  background: linear-gradient(to bottom,
    transparent, rgba(123,158,255,0.4) 20%,
    rgba(255,208,96,0.4) 80%, transparent);
}

/* S4: 種族進化条件 */
.bg-tensura-s4 {
  position:absolute; inset:0; z-index:0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%,
    rgba(255,208,96,0.08), transparent 70%),
    #060410;
}

/* S5: 黒板→異世界ポータル */
.bg-tensura-s5 {
  position:absolute; inset:0; z-index:0;
  background: radial-gradient(ellipse 80% 70% at 50% 50%,
    #0D1020, #04040A);
}
.portal-ring {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(60vw,60vh); height:min(60vw,60vh);
  border-radius:50%;
  border:1px solid rgba(123,158,255,0.15);
  box-shadow: 0 0 40px rgba(123,158,255,0.08),
              inset 0 0 40px rgba(123,158,255,0.05);
}
.portal-ring-2 {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(45vw,45vh); height:min(45vw,45vh);
  border-radius:50%;
  border:1px solid rgba(255,208,96,0.1);
}

/* ── S2 スキルカード：ゲームUI風 ── */
.s2-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  flex:1; gap:2px;
  background:rgba(123,158,255,0.1);
  border:1px solid rgba(123,158,255,0.2);
  margin:0 3rem 3rem;
  position:relative; z-index:2;
}
.sk {
  background:rgba(3,3,20,0.9);
  padding:2rem;
  position:relative; overflow:hidden;
  opacity:0; transform:scale(0.85);
  transition:background 0.3s;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  border:1px solid rgba(123,158,255,0.1);
}
.sk::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,
    rgba(123,158,255,0.05) 0%, transparent 60%);
  pointer-events:none;
}
.sk::after {
  content:'';
  position:absolute; inset:0;
  border:1px solid transparent;

/* ════════════════════
   UTILITIES
════════════════════ */
function parseTags(html){
  return html
    .replace(/<corps>/g,'<span class="tag-corps">').replace(/<\/corps>/g,'</span>')
    .replace(/<danger>/g,'<span class="tag-danger">').replace(/<\/danger>/g,'</span>');
}
function wingsHTML(w=80){
  return `<svg width="${w}" height="${Math.round(w*.51)}" viewBox="0 0 120 60" fill="none">
    <path d="M60 50 C40 40 10 35 2 15 C15 20 28 18 38 28 C30 18 25 8 30 2 C38 12 40 26 48 34 C46 24 46 12 52 6 C55 18 54 30 58 40 L60 50Z" fill="var(--primary)" opacity="0.85"/>
    <path d="M60 50 C80 40 110 35 118 15 C105 20 92 18 82 28 C90 18 95 8 90 2 C82 12 80 26 72 34 C74 24 74 12 68 6 C65 18 66 30 62 40 L60 50Z" fill="var(--primary)" opacity="0.85"/>
    <circle cx="60" cy="52" r="3.5" fill="var(--primary)" opacity="0.8"/>
  </svg>`;
}

/* ════════════════════
   DATA LOAD
════════════════════ */
async function loadData(){
  const parts = location.pathname.replace(/\/+$/,'').split('/');
  const slug  = parts[parts.length-1] || '01-teacher';
  const res   = await fetch(`/data/${slug}.json`);
  if(!res.ok) throw new Error(`JSON not found: ${slug}`);
  return res.json();
}

  <!-- S0: TITLE -->

    ${isTensura ? `<div class="bg-tensura-s0"><canvas id="cv-s0"></canvas></div>` : ''}

      ${d.timeline.map(t=>`
      <div class="tl-row">

  <div class="slide" id="s5">
    ${isTensura ? `<div class="bg-tensura-s5"><div class="portal-ring"></div><div class="portal-ring-2"></div></div>` : ''}

function initCanvases(){
  // Tensura S0: 転生パーティクル
  (function(){
    const cv = document.getElementById('cv-s0');
    if(!cv) return;
    const cx = cv.getContext('2d');
    let W,H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    const particles = Array.from({length:150},(_,i)=>({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.5+.3,
      vx: (Math.random()-.5)*.3,
      vy: (Math.random()-.5)*.15,
      ph: Math.random()*Math.PI*2,
      sp: .5+Math.random()*1.5,
      col: i%3===0 ? '123,158,255' : i%3===1 ? '255,208,96' : '220,230,255'
    }));

    const pillars = Array.from({length:5},(_,i)=>({
      x: .15+i*.18, ph: i*1.2, w: .03+Math.random()*.04
    }));

    let t=0;
    (function loop(){
      t+=.01; cx.clearRect(0,0,W,H);
      cx.fillStyle='#04040E'; cx.fillRect(0,0,W,H);

      pillars.forEach(p=>{
        const pulse=.5+.5*Math.sin(t*.4+p.ph);
        const g=cx.createLinearGradient(p.x*W,0,p.x*W,H);
        g.addColorStop(0,'rgba(123,158,255,0)');
        g.addColorStop(.3,`rgba(123,158,255,${.1*pulse})`);
        g.addColorStop(.6,`rgba(255,208,96,${.06*pulse})`);
        g.addColorStop(1,'rgba(123,158,255,0)');
        const w=p.w*W*pulse;
        cx.fillStyle=g;
        cx.beginPath();
        cx.moveTo(p.x*W-w*.2,0); cx.lineTo(p.x*W+w*.2,0);
        cx.lineTo(p.x*W+w,H); cx.lineTo(p.x*W-w,H);
        cx.closePath(); cx.fill();
      });

      particles.forEach(p=>{
        p.x += p.vx/W + Math.sin(t+p.ph)*.0002;
        p.y += p.vy/H + Math.cos(t*.6+p.ph)*.0001;
        if(p.x<0)p.x=1; if(p.x>1)p.x=0;
        if(p.y<0)p.y=1; if(p.y>1)p.y=0;
        const tw=.3+.7*Math.sin(t*p.sp+p.ph);
        const px=p.x*W, py=p.y*H;
        const g=cx.createRadialGradient(px,py,0,px,py,p.r*5);
        g.addColorStop(0,`rgba(${p.col},${tw*.6})`);
        g.addColorStop(1,`rgba(${p.col},0)`);
        cx.beginPath(); cx.arc(px,py,p.r*5,0,Math.PI*2);
        cx.fillStyle=g; cx.fill();
        cx.beginPath(); cx.arc(px,py,p.r,0,Math.PI*2);
        cx.fillStyle=`rgba(${p.col},${tw*.9})`; cx.fill();
      });

      requestAnimationFrame(loop);
    })();
  })();

  // Jojo4 S0: スタンドパーティクル（紫・金）
  (function(){
    const cv = document.getElementById('cv-s0');
    if(!cv || cv.dataset.jojo4) return;
    // only run for jojo4 theme — check parent class
    if(!cv.closest('.bg-jojo4-s0')) return;
    cv.dataset.jojo4 = '1';
    const cx = cv.getContext('2d');
    let W, H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    const pts = Array.from({length:120},(_,i)=>({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.8+.4,
      vx: (Math.random()-.5)*.25,
      vy: (Math.random()-.5)*.12,
      ph: Math.random()*Math.PI*2,
      sp: .4+Math.random()*1.2,
      col: i%4===0 ? '241,196,15' : i%4===1 ? '155,89,182' : i%4===2 ? '200,160,255' : '255,230,80'
    }));

    const pillars = Array.from({length:4},(_,i)=>({
      x: .15+i*.23, ph: i*.9, w: .025+Math.random()*.035
    }));

    let t=0;
    (function loop(){
      t+=.012; cx.clearRect(0,0,W,H);
      cx.fillStyle='#0A0410'; cx.fillRect(0,0,W,H);

      // light pillars
      pillars.forEach(p=>{
        const pulse=.5+.5*Math.sin(t*.5+p.ph);
        const g=cx.createLinearGradient(p.x*W,0,p.x*W,H);
        g.addColorStop(0,'rgba(155,89,182,0)');
        g.addColorStop(.35,`rgba(155,89,182,${.12*pulse})`);
        g.addColorStop(.65,`rgba(241,196,15,${.07*pulse})`);
        g.addColorStop(1,'rgba(155,89,182,0)');
        const w=p.w*W*pulse;
        cx.fillStyle=g;
        cx.beginPath();
        cx.moveTo(p.x*W-w*.2,0); cx.lineTo(p.x*W+w*.2,0);
        cx.lineTo(p.x*W+w,H); cx.lineTo(p.x*W-w,H);
        cx.closePath(); cx.fill();
      });

      pts.forEach(p=>{
        p.x += p.vx/W + Math.sin(t+p.ph)*.00015;
        p.y += p.vy/H + Math.cos(t*.7+p.ph)*.0001;
        if(p.x<0)p.x=1; if(p.x>1)p.x=0;
        if(p.y<0)p.y=1; if(p.y>1)p.y=0;
        const tw=.3+.7*Math.sin(t*p.sp+p.ph);
        const px=p.x*W, py=p.y*H;
        const g=cx.createRadialGradient(px,py,0,px,py,p.r*6);
        g.addColorStop(0,`rgba(${p.col},${tw*.7})`);
        g.addColorStop(1,`rgba(${p.col},0)`);
        cx.beginPath(); cx.arc(px,py,p.r*6,0,Math.PI*2);
        cx.fillStyle=g; cx.fill();
        cx.beginPath(); cx.arc(px,py,p.r,0,Math.PI*2);
        cx.fillStyle=`rgba(${p.col},${tw})`; cx.fill();
      });

      requestAnimationFrame(loop);
    })();
  })();

  // ── JOJO4: S0 ドドドドパーティクル ──
  (function(){
    const cv = document.getElementById('cv-s0');
    if(!cv || document.querySelector('#s0 .bg-jojo-s0') === null) return;
    const cx = cv.getContext('2d');
    let W,H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    const cols = Math.floor(innerWidth / 60);
    const drops = Array.from({length:cols},()=>({
      y: Math.random()*-100,
      speed: 0.3+Math.random()*0.8,
      char: ['ド','ゴ','ズ','バ','ギ'][Math.floor(Math.random()*5)],
      size: 20+Math.random()*30,
      alpha: 0.03+Math.random()*0.06,
    }));

    const particles = Array.from({length:80},(_,i)=>({
      x:Math.random(), y:Math.random(),
      r:Math.random()*2+0.5,
      vx:(Math.random()-.5)*.4,
      vy:(Math.random()-.5)*.2,
      ph:Math.random()*Math.PI*2,
      col: i%3===0 ? '155,89,182' : i%3===1 ? '241,196,15' : '200,150,220'
    }));

    let t=0;
    (function loop(){
      t+=.012; cx.clearRect(0,0,W,H);
      cx.fillStyle='#0A0008'; cx.fillRect(0,0,W,H);

      drops.forEach((d,i)=>{
        cx.font=`900 ${d.size}px 'Noto Serif JP',serif`;
        cx.fillStyle=`rgba(155,89,182,${d.alpha})`;
        cx.fillText(d.char, i*(W/cols), d.y);
        d.y += d.speed;
        if(d.y > H+50) d.y = -50;
      });

      particles.forEach(p=>{
        p.x+=p.vx/W; p.y+=p.vy/H;
        if(p.x<0)p.x=1; if(p.x>1)p.x=0;
        if(p.y<0)p.y=1; if(p.y>1)p.y=0;
        const tw=.5+.5*Math.sin(t+p.ph);
        const px=p.x*W, py=p.y*H;
        const g=cx.createRadialGradient(px,py,0,px,py,p.r*8);
        g.addColorStop(0,`rgba(${p.col},${tw*.4})`);
        g.addColorStop(1,`rgba(${p.col},0)`);
        cx.beginPath(); cx.arc(px,py,p.r*8,0,Math.PI*2);
        cx.fillStyle=g; cx.fill();
      });

      requestAnimationFrame(loop);
    })();
  })();

  // ── JOJO4: S1 集中線 ──
  (function(){
    const cv = document.getElementById('cv-s1');
    if(!cv) return;
    const cx = cv.getContext('2d');
    let W,H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    let t=0;
    (function loop(){
      t+=.008; cx.clearRect(0,0,W,H);
      cx.fillStyle='#F1C40F'; cx.fillRect(0,0,W,H);

      const cx2=W/2, cy2=H/2;
      const lineCount=120;
      for(let i=0;i<lineCount;i++){
        const angle=(i/lineCount)*Math.PI*2;
        const pulse=0.3+0.2*Math.sin(t*2+i*.1);
        const x1=cx2+Math.cos(angle)*80;
        const y1=cy2+Math.sin(angle)*80;
        const x2=cx2+Math.cos(angle)*Math.max(W,H)*1.5;
        const y2=cy2+Math.sin(angle)*Math.max(W,H)*1.5;
        cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2);
        cx.strokeStyle=`rgba(0,0,0,${pulse})`;
        cx.lineWidth=i%3===0?2:0.8; cx.stroke();
      }

      requestAnimationFrame(loop);
    })();
  })();

  // ── JOJO4: S3 効果線 ──
  (function(){
    const cv = document.getElementById('cv-s3');
    if(!cv) return;
    const cx = cv.getContext('2d');
    let W,H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    let t=0;
    (function loop(){
      t+=.01; cx.clearRect(0,0,W,H);
      cx.fillStyle='#9B59B6'; cx.fillRect(0,0,W,H);

      for(let i=0;i<30;i++){
        const y=Math.random()*H;
        const len=100+Math.random()*300;
        const x=Math.random()*W;
        const pulse=0.05+0.1*Math.random();
        cx.beginPath(); cx.moveTo(x,y); cx.lineTo(x+len,y);
        cx.strokeStyle=`rgba(0,0,0,${pulse})`; cx.lineWidth=1+Math.random()*3; cx.stroke();
      }

      cx.font=`900 ${60+20*Math.sin(t)}px 'Noto Serif JP',serif`;
      cx.fillStyle=`rgba(0,0,0,0.05)`;
      cx.fillText('ゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴ',0,H*.5);

      requestAnimationFrame(loop);
    })();
  })();

  // ── JOJO4: S4 ゴゴゴゴゴ ──
  (function(){
    const cv = document.getElementById('cv-s4');
    if(!cv) return;
    const cx = cv.getContext('2d');
    let W,H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    const rows = 8;
    let t=0;
    (function loop(){
      t+=.015; cx.clearRect(0,0,W,H);
      cx.fillStyle='#0A0008'; cx.fillRect(0,0,W,H);

      for(let row=0;row<rows;row++){
        const y=(row/rows)*H + (t*20)%(H/rows);
        const offset=row%2===0?0:W*.1;
        const size=30+10*Math.sin(t+row);
        const alpha=0.04+0.02*Math.sin(t*1.5+row);
        cx.font=`900 ${size}px 'Noto Serif JP',serif`;
        cx.fillStyle=`rgba(155,89,182,${alpha})`;
        cx.fillText('ゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴゴ',offset-((t*30)%200),y);
      }

      for(let i=0;i<8;i++){
        const x=(i/8)*W+Math.sin(t*.5+i)*20;
        const pulse=0.03+0.02*Math.sin(t+i);
        cx.beginPath();
        cx.moveTo(x,-50); cx.lineTo(x+100,H+50);
        cx.strokeStyle=`rgba(241,196,15,${pulse})`;
        cx.lineWidth=1; cx.stroke();
      }

      requestAnimationFrame(loop);
    })();
  })();

  // ── JOJO4: S5 スタンドオーラ ──
  (function(){
    const cv = document.getElementById('cv-s5');
    if(!cv) return;
    const cx = cv.getContext('2d');
    let W,H;
    function resize(){ W=cv.width=cv.offsetWidth; H=cv.height=cv.offsetHeight; }
    resize(); new ResizeObserver(resize).observe(cv);

    const particles = Array.from({length:120},(_,i)=>({
      angle:Math.random()*Math.PI*2,
      r:100+Math.random()*200,
      speed:0.002+Math.random()*.008,
      size:Math.random()*3+0.5,
      col: i%2===0 ? '155,89,182' : '241,196,15',
      alpha:0.2+Math.random()*.4,
    }));

    let t=0;
    (function loop(){
      t+=.01; cx.clearRect(0,0,W,H);
      cx.fillStyle='#0A0008'; cx.fillRect(0,0,W,H);

      const cx2=W/2, cy2=H/2;

      particles.forEach(p=>{
        p.angle+=p.speed;
        const x=cx2+Math.cos(p.angle)*p.r*(0.8+0.2*Math.sin(t*2+p.angle));
        const y=cy2+Math.sin(p.angle)*p.r*(0.8+0.2*Math.cos(t*1.5+p.angle));
        const pulse=0.5+0.5*Math.sin(t*3+p.angle);
        const g=cx.createRadialGradient(x,y,0,x,y,p.size*6);
        g.addColorStop(0,`rgba(${p.col},${p.alpha*pulse})`);
        g.addColorStop(1,`rgba(${p.col},0)`);
        cx.beginPath(); cx.arc(x,y,p.size*6,0,Math.PI*2);
        cx.fillStyle=g; cx.fill();
      });

      const glow=cx.createRadialGradient(cx2,cy2,0,cx2,cy2,150);
      glow.addColorStop(0,`rgba(155,89,182,${0.1+0.05*Math.sin(t)})`);
      glow.addColorStop(1,'rgba(155,89,182,0)');
      cx.fillStyle=glow; cx.fillRect(0,0,W,H);

      requestAnimationFrame(loop);
    })();
  })();
}

/* ════════════════════
   GSAP ANIMATIONS
════════════════════ */
function initGSAP(d){
  gsap.registerPlugin(ScrollTrigger);
  const scroller = document.getElementById('scroll-container');

  ScrollTrigger.scrollerProxy(scroller,{
    scrollTop(v){ if(arguments.length) scroller.scrollTop=v; return scroller.scrollTop; },
    getBoundingClientRect(){ return{top:0,left:0,width:innerWidth,height:innerHeight}; },
    pinType:'transform'
  });
  scroller.addEventListener('scroll', ScrollTrigger.update);
  ScrollTrigger.defaults({ scroller });

  // Progress
  const progressEl = document.getElementById('progress');
  const slideNumEl = document.getElementById('slide-num');
  const hintEl     = document.getElementById('scroll-hint');
  progressEl.style.background = `linear-gradient(to right, ${d.color_primary}, ${d.color_accent})`;

  ScrollTrigger.create({
    trigger:'#slides', start:'top top', end:'bottom bottom',
    onUpdate(self){
      progressEl.style.width=(self.progress*100)+'%';
      const cur=Math.round(self.progress*5)+1;
      slideNumEl.textContent=String(cur).padStart(2,'0')+' / 06';
      hintEl.style.opacity=self.progress>.05?'0':'1';
    }
  });

  /* ── S0 ENTER: タイトルがZ軸から降ってくる ── */
  gsap.set('.s0-en',    { scale:10, opacity:0, filter:'blur(50px) brightness(5)' });
  gsap.set('.s-classify',{ opacity:0, y:30 });
  gsap.set('.wings-svg', { scale:0, opacity:0, rotation:-20 });
  gsap.set('.s0-ja',    { opacity:0, letterSpacing:'1.5em' });
  gsap.set('.s0-vow',   { opacity:0, y:20 });

  gsap.timeline({ defaults:{ ease:'power4.out' } })
    .to('.s0-en',     { scale:1, opacity:1, filter:'blur(0px) brightness(1)', duration:1.8 }, 0.1)
    .to('.s-classify',{ opacity:1, y:0, duration:0.6 }, 0.6)
    .to('.wings-svg', { scale:1, opacity:1, rotation:0, duration:1, ease:'back.out(2)' }, 0.9)
    .to('.s0-ja',     { opacity:1, letterSpacing:'0.65em', duration:1 }, 1.1)
    .to('.s0-vow',    { opacity:1, y:0, duration:0.6 }, 1.6);

  /* ── S0 EXIT: スクロールでZ軸に突き抜ける ── */
  gsap.timeline({
    scrollTrigger:{ trigger:'#s0', start:'top top', end:'bottom top', scrub:1.2 }
  })
  .to('.s0-en',      { scale:18, opacity:0, filter:'blur(60px)', ease:'power3.in' }, 0)
  .to('.s0-bg-text', { scale:3, opacity:0, ease:'power2.in' }, 0)
  .to('.s0-ja',      { opacity:0, letterSpacing:'3em', ease:'power2.in' }, 0)
  .to('.wings-svg',  { scale:0.2, opacity:0, rotation:30, ease:'power2.in' }, 0)
  .to('.s-classify', { opacity:0, y:-30, ease:'power2.in' }, 0)
  .to('.s0-vow',     { opacity:0, y:-20, ease:'power2.in' }, 0);

  /* ── S1 ENTER: 単語が下から飛び込む ── */
  gsap.set('.s1-label', { opacity:0, x:-40 });
  gsap.set('.s1-kinetic .line-inner', { y:'110%', scale:1.3, filter:'blur(10px)' });
  gsap.set('.s1-sub', { opacity:0, y:40 });

  gsap.timeline({
    scrollTrigger:{ trigger:'#s1', start:'top bottom', end:'top top', scrub:1.2 }
  })
  .to('.s1-label', { opacity:1, x:0, duration:0.2 })
  .to('.s1-kinetic .line-inner', {
    y:'0%', scale:1, filter:'blur(0px)',
    duration:0.5, stagger:0.1, ease:'power3.out'
  }, '<0.1')
  .to('.s1-sub', { opacity:1, y:0, duration:0.3 }, '<0.3');

  /* ── S1 EXIT: Z軸に吸い込まれる ── */
  gsap.timeline({
    scrollTrigger:{ trigger:'#s1', start:'bottom bottom', end:'bottom top', scrub:1.2 }
  })
  .to('.s1-kinetic', { scale:0.05, opacity:0, filter:'blur(30px)', ease:'power3.in' }, 0)
  .to('.s1-sub',     { opacity:0, y:-50, ease:'power2.in' }, 0)
  .to('.s1-label',   { opacity:0, x:50, ease:'power2.in' }, 0);

  /* ── S2 ENTER: カードが奥から爆発 ── */
  gsap.set('.s2-header', { opacity:0, y:20 });
  gsap.timeline({
    scrollTrigger:{ trigger:'#s2', start:'top bottom', end:'top top', scrub:1.2 }
  })
  .to('.s2-header', { opacity:1, y:0, duration:0.25 })
  .to('.sk', {
    opacity:1, scale:1, translateZ:0,
    duration:0.4, stagger:{ amount:0.5, from:'start' },
    ease:'back.out(1.5)'
  }, '<0.1');

  /* ── S3 ENTER: タイムライン行が左から走る ── */
  gsap.set('.s3-label', { opacity:0, x:-40 });
  gsap.timeline({
    scrollTrigger:{ trigger:'#s3', start:'top bottom', end:'top top', scrub:1.2 }
  })
  .to('.s3-label', { opacity:1, x:0, duration:0.2 })
  .to('.tl-row', { opacity:1, x:0, duration:0.35, stagger:0.07, ease:'power2.out' }, '<0.1');

  /* ── S4 ENTER: 右から押し出される ── */
  gsap.set('.s4-label', { opacity:0, x:-40 });
  gsap.set('.req-kinetic', { opacity:0, scale:0.4 });
  gsap.timeline({
    scrollTrigger:{ trigger:'#s4', start:'top bottom', end:'top top', scrub:1.2 }
  })
  .to('.s4-label',    { opacity:1, x:0, duration:0.2 })
  .to('.req-row',     { opacity:1, x:0, duration:0.35, stagger:0.08, ease:'power2.out' }, '<0.15')
  .to('.req-kinetic', { opacity:1, scale:1, duration:0.4, ease:'elastic.out(1,.7)' }, '<0.5');

  /* ── S5 ENTER: REVEALが宇宙から収束 ── */
  gsap.set('.s5-big',  { scale:20, opacity:0, filter:'blur(80px) brightness(6)' });
  gsap.set('.s5-pre',  { opacity:0, y:30 });
  gsap.set('.s5-body', { opacity:0, y:30 });
  gsap.set('.s5-ja',   { opacity:0, letterSpacing:'1.5em' });
  gsap.set('.s5-wings',{ scale:0, opacity:0, rotation:-25 });
  gsap.set('.s5-vow',  { opacity:0, y:20 });
  gsap.set(['.s5-next', '.s5-cta'], { opacity:0, y:20 });

  gsap.timeline({
    scrollTrigger:{ trigger:'#s5', start:'top bottom', end:'top top', scrub:1.2 }
  })
  .to('.s5-pre',  { opacity:1, y:0, duration:0.15 })
  .to('.s5-body', { opacity:1, y:0, duration:0.2 }, '<0.05')
  .to('.s5-big',  { scale:1, opacity:1, filter:'blur(0px) brightness(1)', duration:0.5, ease:'power4.out' }, '<0.1')
  .to('.s5-ja',   { opacity:1, letterSpacing:'0.3em', duration:0.3 }, '<0.35')
  .to('.s5-wings',{ scale:1, opacity:1, rotation:0, duration:0.25, ease:'back.out(2)' }, '<0.1')
  .to('.s5-vow',  { opacity:1, y:0, duration:0.2 }, '<0.1')
  .to('.s5-next', { opacity:1, y:0, duration:0.2 }, '<0.05')
  .to('.s5-cta',  { opacity:1, y:0, duration:0.3 }, '<0.1');

  // Wings float loop
  gsap.to('.s5-wings', { y:-8, duration:2, ease:'sine.inOut', yoyo:true, repeat:-1, delay:2 });

  ScrollTrigger.refresh();
}

/* ════════════════════
   BOOT
════════════════════ */
(async()=>{
  try {
    const data = await loadData();
    buildDOM(data);
    initCanvases();
    initGSAP(data);
    setTimeout(()=>{ document.getElementById('loading').classList.add('hidden'); }, 500);
  } catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML='<span style="color:#CC3333">ERROR: データが読み込めません</span>';
  }
})();
</script>
