<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職業図鑑：異能者編 | Loading...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --primary: #5FA870;
  --accent:  #C8A040;
  --chalk:   #EDE4C8;
  --dim:     #7A7060;
  --red:     #CC3333;
  --black:   #06060A;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--black); color:var(--chalk); font-family:'Noto Serif JP',serif; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:999;
  display:flex; align-items:center; justify-content:center;
  background:var(--black);
  transition:opacity 0.6s;
}
#loading span {
  font-family:'Space Mono',monospace; font-size:0.65rem;
  letter-spacing:0.4em; color:var(--primary);
}
#loading.hidden { opacity:0; pointer-events:none; }

/* ── BG CANVAS ── */
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#scanlines  { position:fixed; inset:0; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px); }
#vignette   { position:fixed; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 35%,rgba(0,0,0,0.75) 100%); }

/* ── SCROLL ── */
#scroll-container { position:fixed; inset:0; z-index:10; overflow-y:scroll; overflow-x:hidden; }
#scroll-container::-webkit-scrollbar { width:0; }
#slides { width:100%; }

/* ── SLIDE BASE ── */
.slide { position:relative; width:100%; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; overflow:hidden; }

/* ── UI ── */
#progress { position:fixed; top:0; left:0; height:2px; z-index:200; width:0%; transition:width 0.1s; }
#slide-num { position:fixed; bottom:2rem; right:2rem; font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.3em; color:var(--dim); z-index:200; }
#scroll-hint { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:0.4rem; z-index:200; transition:opacity 0.5s; }
#scroll-hint span { font-family:'Space Mono',monospace; font-size:0.5rem; letter-spacing:0.35em; color:var(--primary); }
.scroll-bar { width:1px; height:36px; background:linear-gradient(to bottom,var(--primary),transparent); }

/* ── SLIDE 0: TITLE ── */
.s-classify { font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.45em; color:var(--red); border:1px solid rgba(204,51,51,0.4); padding:0.35rem 1.2rem; margin-bottom:3rem; text-transform:uppercase; position:relative; z-index:5; opacity:0; }
.wings-svg  { display:block; width:90px; margin:0 auto 2rem; opacity:0; position:relative; z-index:5; }
.s0-en { font-family:'Cinzel',serif; font-size:clamp(3.5rem,12vw,9rem); font-weight:900; line-height:0.82; letter-spacing:-0.02em; color:var(--chalk); opacity:0; position:relative; z-index:5; }
.s0-ja { font-family:'Noto Serif JP',serif; font-size:clamp(0.85rem,2.5vw,1.4rem); font-weight:300; letter-spacing:0.65em; margin-top:1.5rem; opacity:0; position:relative; z-index:5; }
.s0-vow { margin-top:2.5rem; font-family:'Cinzel',serif; font-size:clamp(0.65rem,1.5vw,0.85rem); letter-spacing:0.25em; color:var(--accent); opacity:0; position:relative; z-index:5; }

/* ── SLIDE 1: MISSION ── */
.s-label { position:absolute; top:3rem; left:3rem; font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.4em; color:var(--primary); opacity:0; z-index:5; }
.s1-big  { font-family:'Cinzel',serif; font-size:clamp(2.5rem,9vw,7rem); font-weight:900; line-height:1.05; color:var(--chalk); position:relative; z-index:5; }
.word-reveal { display:inline-block; overflow:hidden; vertical-align:bottom; }
.word-inner  { display:inline-block; transform:translateY(110%); }
.s1-sub { margin-top:2rem; font-size:clamp(0.85rem,2vw,1.05rem); line-height:2.4; color:var(--dim); max-width:560px; opacity:0; z-index:5; position:relative; }

/* ── SLIDE 2: SKILLS ── */
#s2 { align-items:stretch; justify-content:flex-start; }
.s2-header { display:flex; align-items:baseline; gap:1.5rem; padding:3rem 3rem 2rem; border-bottom:1px solid rgba(255,255,255,0.1); opacity:0; position:relative; z-index:5; }
.s2-eyebrow { font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.4em; color:var(--primary); }
.s2-title   { font-family:'Cinzel',serif; font-size:clamp(1rem,3vw,1.8rem); font-weight:900; color:var(--chalk); letter-spacing:0.1em; }
.s2-grid { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); flex:1; gap:1px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); margin:0 3rem 3rem; position:relative; z-index:5; }
.sk { background:rgba(6,6,10,0.6); padding:1.8rem; position:relative; overflow:hidden; opacity:0; transform:scale(0.9); transition:background 0.3s; backdrop-filter:blur(8px); }
.sk:hover { background:rgba(255,255,255,0.04); }
.sk::before { content:''; position:absolute; top:0; right:0; width:28px; height:28px; border-top:1px solid var(--primary); border-right:1px solid var(--primary); opacity:0.4; }
.sk-num  { font-family:'Cinzel',serif; font-size:2rem; font-weight:900; color:rgba(255,255,255,0.06); position:absolute; bottom:0.5rem; right:1rem; line-height:1; }
.sk-tag  { font-family:'Space Mono',monospace; font-size:0.5rem; letter-spacing:0.3em; color:var(--primary); margin-bottom:0.5rem; }
.sk-name { font-family:'Cinzel',serif; font-size:clamp(0.7rem,1.5vw,0.88rem); font-weight:700; color:var(--chalk); margin-bottom:0.15rem; line-height:1.3; }
.sk-ja   { font-family:'Space Mono',monospace; font-size:0.58rem; color:var(--accent); margin-bottom:0.8rem; }
.sk-body { font-size:clamp(0.68rem,1.2vw,0.78rem); line-height:1.9; color:var(--dim); }

/* ── SLIDE 3: TIMELINE ── */
#s3 { align-items:stretch; justify-content:flex-start; }
.tl-wrap { width:100%; max-width:700px; margin:5.5rem auto 0; position:relative; z-index:5; }
.tl-wrap::before { content:''; position:absolute; left:5.5rem; top:0; bottom:0; width:1px; background:linear-gradient(to bottom,transparent,var(--primary) 10%,var(--accent) 90%,transparent); }
.tl-row  { display:grid; grid-template-columns:6rem 1fr; gap:2rem; margin-bottom:1.8rem; opacity:0; transform:translateX(-30px); }
.tl-t    { font-family:'Space Mono',monospace; font-size:0.62rem; color:var(--primary); text-align:right; padding-top:0.1rem; text-shadow:0 0 8px rgba(95,168,112,0.5); }
.tl-head { font-family:'Cinzel',serif; font-size:0.75rem; color:var(--accent); letter-spacing:0.1em; margin-bottom:0.3rem; }
.tl-body { font-size:0.75rem; line-height:1.9; color:var(--dim); }

/* ── SLIDE 4: REQUIREMENTS ── */
.req-stack { width:100%; max-width:680px; position:relative; z-index:5; }
.req-row { display:flex; gap:1.5rem; border:1px solid rgba(255,255,255,0.08); padding:1.4rem 1.8rem; margin-bottom:1px; position:relative; opacity:0; transform:translateX(40px); backdrop-filter:blur(6px); background:rgba(6,6,10,0.5); }
.req-row::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(255,255,255,0.03),transparent); pointer-events:none; }
.req-num  { font-family:'Cinzel',serif; font-size:1.4rem; font-weight:900; color:var(--primary); flex-shrink:0; width:1.8rem; text-align:center; line-height:1.1; }
.req-head { font-family:'Cinzel',serif; font-size:0.76rem; color:var(--chalk); letter-spacing:0.12em; margin-bottom:0.4rem; }
.req-body { font-size:0.76rem; line-height:2; color:var(--dim); }
.req-kinetic { margin-top:2.5rem; font-family:'Cinzel',serif; font-size:clamp(1.2rem,4vw,2.5rem); font-weight:900; color:var(--primary); letter-spacing:0.1em; opacity:0; position:relative; z-index:5; }

/* ── SLIDE 5: REVEAL ── */
.s5-pre  { font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.45em; color:var(--primary); text-transform:uppercase; opacity:0; margin-bottom:2rem; position:relative; z-index:5; }
.s5-body { font-size:clamp(0.85rem,1.8vw,1rem); line-height:2.6; color:var(--dim); max-width:480px; opacity:0; position:relative; z-index:5; margin-bottom:3rem; }
.s5-big  { font-family:'Cinzel',serif; font-size:clamp(3rem,12vw,8rem); font-weight:900; color:var(--chalk); filter:drop-shadow(0 0 40px rgba(255,255,255,0.15)); opacity:0; position:relative; z-index:5; line-height:1; }
.s5-ja   { font-family:'Space Mono',monospace; font-size:clamp(0.7rem,2vw,1rem); color:var(--primary); letter-spacing:0.3em; opacity:0; margin-top:0.5rem; position:relative; z-index:5; }
.s5-wings{ opacity:0; margin:1.5rem 0; position:relative; z-index:5; }
.s5-vow  { font-family:'Cinzel',serif; font-size:clamp(0.65rem,1.5vw,0.85rem); color:var(--accent); letter-spacing:0.2em; font-style:italic; opacity:0; margin-top:1rem; position:relative; z-index:5; }
.s5-next { margin-top:2.5rem; display:inline-flex; align-items:center; gap:0.8rem; border:1px solid rgba(255,255,255,0.15); padding:0.8rem 1.8rem; font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.25em; color:var(--dim); text-transform:uppercase; opacity:0; position:relative; z-index:5; text-decoration:none; transition:border-color 0.3s; }
.s5-next:hover { border-color:var(--primary); color:var(--chalk); }
.s5-next::before { content:'▶'; color:var(--primary); }

/* ── INLINE TAG STYLES ── */
.tag-corps  { color:var(--primary); }
.tag-danger { color:var(--red); }

/* ── WINGS SVG ── */
.wings-icon { display:block; filter:drop-shadow(0 0 16px rgba(95,168,112,0.7)); }

@media(max-width:768px){ .s2-grid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:500px){ .s2-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<div id="loading"><span>DECRYPTING...</span></div>

<canvas id="bg-canvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="progress"></div>
<div id="slide-num">01 / 06</div>
<div id="scroll-hint"><span>Scroll</span><div class="scroll-bar"></div></div>

<div id="scroll-container">
  <div id="slides"><!-- JS が生成 --></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
/* ════════════════════════════════════════
   1. JSON読み込み
════════════════════════════════════════ */
async function loadData() {
  // URLから slug を取得: /vol/01-teacher/ → 01-teacher
  const parts = location.pathname.replace(/\/+$/,'').split('/');
  const slug  = parts[parts.length - 1] || '01-teacher';
  const res   = await fetch(`/data/${slug}.json`);
  if (!res.ok) throw new Error(`JSON not found: ${slug}`);
  return res.json();
}

/* ════════════════════════════════════════
   2. タグ変換（<corps> <danger> → span）
════════════════════════════════════════ */
function parseTags(html) {
  return html
    .replace(/<corps>/g,  '<span class="tag-corps">')
    .replace(/<\/corps>/g,'</span>')
    .replace(/<danger>/g, '<span class="tag-danger">')
    .replace(/<\/danger>/g,'</span>');
}

/* ════════════════════════════════════════
   3. Wings SVG
════════════════════════════════════════ */
function wingsHTML(cls = 'wings-icon', w = 90) {
  return `<svg class="${cls}" width="${w}" height="${Math.round(w*0.51)}" viewBox="0 0 120 60" fill="none">
    <path d="M60 50 C40 40 10 35 2 15 C15 20 28 18 38 28 C30 18 25 8 30 2 C38 12 40 26 48 34 C46 24 46 12 52 6 C55 18 54 30 58 40 L60 50Z" fill="var(--primary)" opacity="0.85"/>
    <path d="M60 50 C80 40 110 35 118 15 C105 20 92 18 82 28 C90 18 95 8 90 2 C82 12 80 26 72 34 C74 24 74 12 68 6 C65 18 66 30 62 40 L60 50Z" fill="var(--primary)" opacity="0.85"/>
    <circle cx="60" cy="52" r="3.5" fill="var(--primary)" opacity="0.8"/>
  </svg>`;
}

/* ════════════════════════════════════════
   4. DOM生成
════════════════════════════════════════ */
function buildDOM(d) {
  document.title = `${d.title_ja.replace(/\s/g,'')} | 職業図鑑：異能者編`;

  // CSS変数を上書き
  document.documentElement.style.setProperty('--primary', d.color_primary);
  document.documentElement.style.setProperty('--accent',  d.color_accent);

  const slides = document.getElementById('slides');
  slides.innerHTML = `

    <!-- S0: TITLE -->
    <div class="slide" id="s0">
      <p class="s-classify">${d.classify}</p>
      ${d.wings ? `<div class="wings-svg">${wingsHTML()}</div>` : ''}
      <h1 class="s0-en">${d.title_en.replace(' ','<br>')}</h1>
      <p class="s0-ja">${d.title_ja}</p>
      <p class="s0-vow">${d.vow}</p>
    </div>

    <!-- S1: MISSION -->
    <div class="slide" id="s1">
      <p class="s-label" id="s1-label">${d.mission.label}</p>
      <div class="s1-big" id="s1-headline">
        ${d.mission.headline.map((w,i) =>
          `<span class="word-reveal"><span class="word-inner" ${i >= d.mission.headline_accent_from ? 'style="color:var(--primary)"' : ''}>${w}</span></span>`
        ).join('\n        ')}
      </div>
      <p class="s1-sub">${parseTags(d.mission.body)}</p>
    </div>

    <!-- S2: SKILLS -->
    <div class="slide" id="s2">
      <div class="s2-header">
        <span class="s2-eyebrow">// Six Forbidden Arts</span>
        <span class="s2-title">固 有 異 能 一 覧</span>
      </div>
      <div class="s2-grid">
        ${d.skills.map((s,i) => `
        <div class="sk">
          <span class="sk-num">${['I','II','III','IV','V','VI'][i]}</span>
          <p class="sk-tag">${s.tag}</p>
          <p class="sk-name">${s.name_en}</p>
          <p class="sk-ja">${s.name_ja}</p>
          <p class="sk-body">${parseTags(s.body)}</p>
        </div>`).join('')}
      </div>
    </div>

    <!-- S3: TIMELINE -->
    <div class="slide" id="s3">
      <p class="s-label" id="s3-label">// Daily Chronicle · 壁外遠征記録</p>
      <div class="tl-wrap">
        ${d.timeline.map(t => `
        <div class="tl-row">
          <span class="tl-t">${t.time}</span>
          <div>
            <p class="tl-head">${t.head}</p>
            <p class="tl-body">${parseTags(t.body)}</p>
          </div>
        </div>`).join('')}
      </div>
    </div>

    <!-- S4: REQUIREMENTS -->
    <div class="slide" id="s4">
      <p class="s-label" id="s4-label">// Required Qualities · 入団適性条件</p>
      <div class="req-stack">
        ${d.requirements.map((r,i) => `
        <div class="req-row">
          <span class="req-num">${['I','II','III','IV'][i]}</span>
          <div>
            <p class="req-head">${r.head}</p>
            <p class="req-body">${parseTags(r.body)}</p>
          </div>
        </div>`).join('')}
      </div>
      <p class="req-kinetic">— ${d.vow}</p>
    </div>

    <!-- S5: REVEAL -->
    <div class="slide" id="s5">
      <p class="s5-pre">// Classified Information Decrypted · 機密解除完了</p>
      <p class="s5-body">${parseTags(d.reveal.pre_text)}</p>
      <p class="s5-big">${d.reveal.occupation_en}</p>
      <p class="s5-ja">${d.reveal.occupation_ja}</p>
      ${d.wings ? `<div class="s5-wings">${wingsHTML('wings-icon',90)}</div>` : ''}
      <p class="s5-vow">${d.reveal.vow}</p>
      <a class="s5-next" href="/vol/${d.reveal.next_slug}/">
        Next Vol.${d.reveal.next_vol} · ${d.reveal.next_name}
      </a>
    </div>
  `;
}

/* ════════════════════════════════════════
   5. 背景エンジン（テーマ別）
════════════════════════════════════════ */
const bgCv = document.getElementById('bg-canvas');
const bgCx = bgCv.getContext('2d');
let W, H;
function resize(){ W=bgCv.width=innerWidth; H=bgCv.height=innerHeight; }
resize(); addEventListener('resize', resize);

let slideRatio = 0;
const scroller = document.getElementById('scroll-container');
scroller.addEventListener('scroll',()=>{
  const max = scroller.scrollHeight - innerHeight;
  if(max>0) slideRatio = (scroller.scrollTop/max)*5;
});

const lerp=(a,b,t)=>a+(b-a)*t;
const clamp01=v=>Math.max(0,Math.min(1,v));
const ease=v=>v*v*(3-2*v);

// 共通パーティクル
let particles=[];
function initParticles(col1='61,107,74', col2='200,160,64'){
  particles=[
    ...Array.from({length:50},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.4,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.09,a:.25*(0.4+Math.random()*.6),col:col1,ph:Math.random()*Math.PI*2})),
    ...Array.from({length:30},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.3,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.08,a:.18*(0.4+Math.random()*.6),col:col2,ph:Math.random()*Math.PI*2})),
  ];
}

function drawParticles(t){
  particles.forEach(p=>{
    p.x+=p.vx/W+Math.sin(t+p.ph)*.0001; p.y+=p.vy/H+Math.cos(t*.7+p.ph)*.00005;
    if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
    const px=p.x*W, py=p.y*H;
    const g=bgCx.createRadialGradient(px,py,0,px,py,p.r*6);
    g.addColorStop(0,`rgba(${p.col},${p.a})`);
    g.addColorStop(1,`rgba(${p.col},0)`);
    bgCx.beginPath(); bgCx.arc(px,py,p.r*6,0,Math.PI*2); bgCx.fillStyle=g; bgCx.fill();
    bgCx.beginPath(); bgCx.arc(px,py,p.r,0,Math.PI*2); bgCx.fillStyle=`rgba(${p.col},${Math.min(p.a*3,.9)})`; bgCx.fill();
  });
}

// ─── テーマ：shingeki（進撃の巨人）───
const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.3,twinkle:Math.random()*Math.PI*2,speed:.5+Math.random()*1.5}));
const pillars=Array.from({length:7},(_,i)=>({x:.1+i*.13,w:.04+Math.random()*.05,ph:Math.random()*Math.PI*2}));

function drawShingeki(s, t){
  const w0=ease(clamp01(1-Math.abs(s-0)*1.5));
  const w1=ease(clamp01(1-Math.abs(s-1)*1.5));
  const w2=ease(clamp01(1-Math.abs(s-2)*1.5));
  const w3=ease(clamp01(1-Math.abs(s-3)*1.5));
  const w4=ease(clamp01(1-Math.abs(s-4)*1.5));
  const w5=ease(clamp01(1-Math.abs(s-5)*1.5));

  bgCx.clearRect(0,0,W,H);

  // S0: 星空 + 光の柱
  if(w0>0){
    bgCx.save(); bgCx.globalAlpha=w0;
    const sky=bgCx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#06060A'); sky.addColorStop(.6,'#0A1A10'); sky.addColorStop(1,'#06060A');
    bgCx.fillStyle=sky; bgCx.fillRect(0,0,W,H);
    stars.forEach(s2=>{ const tw=.4+.6*Math.sin(t*s2.speed+s2.twinkle); bgCx.beginPath(); bgCx.arc(s2.x*W,s2.y*H,s2.r,0,Math.PI*2); bgCx.fillStyle=`rgba(220,240,220,${tw*.8})`; bgCx.fill(); });
    pillars.forEach(p=>{ const pulse=.6+.4*Math.sin(t*.6+p.ph); const cx2=p.x*W; const cw=p.w*W*pulse; const g=bgCx.createLinearGradient(cx2,0,cx2,H*.85); g.addColorStop(0,'rgba(95,168,112,0)'); g.addColorStop(.2,`rgba(95,168,112,${.06*pulse})`); g.addColorStop(.5,`rgba(200,160,64,${.04*pulse})`); g.addColorStop(1,'rgba(95,168,112,0)'); bgCx.fillStyle=g; bgCx.beginPath(); bgCx.moveTo(cx2-cw*.3,0); bgCx.lineTo(cx2+cw*.3,0); bgCx.lineTo(cx2+cw,H); bgCx.lineTo(cx2-cw,H); bgCx.closePath(); bgCx.fill(); });
    bgCx.restore();
  }

  // S1: 石の壁
  if(w1>0){
    bgCx.save(); bgCx.globalAlpha=w1;
    bgCx.fillStyle='#080C0A'; bgCx.fillRect(0,0,W,H);
    const bw=W/8,bh=H/10;
    for(let row=0;row<11;row++) for(let col=0;col<9;col++){ const off=row%2===0?0:bw*.5; const x=col*bw-off-bw*.5; const y=row*bh-bh*.5; bgCx.fillStyle=`rgba(60,80,60,${.03+.04*((row+col)%3===0?1:0)})`; bgCx.fillRect(x+1,y+1,bw-2,bh-2); bgCx.strokeStyle='rgba(95,168,112,0.06)'; bgCx.lineWidth=1; bgCx.strokeRect(x+1,y+1,bw-2,bh-2); }
    const g=bgCx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,W*.5); g.addColorStop(0,'rgba(61,107,74,0.12)'); g.addColorStop(1,'rgba(61,107,74,0)'); bgCx.fillStyle=g; bgCx.fillRect(0,0,W,H);
    bgCx.restore();
  }

  // S2: ワイヤー網
  if(w2>0){
    bgCx.save(); bgCx.globalAlpha=w2;
    bgCx.fillStyle='#040810'; bgCx.fillRect(0,0,W,H);
    for(let i=0;i<20;i++){ const ax=Math.sin(i*1.3+t*.15)*W*.5+W*.5; const ay=(i/20)*H; const bx=Math.sin(i*2.1+t*.1)*W*.5+W*.5; const by=((i+1)/20)*H; const pulse=.03+.02*Math.sin(t*1.2+i); bgCx.beginPath(); bgCx.moveTo(ax,ay); bgCx.quadraticCurveTo((ax+bx)/2,ay+(by-ay)*.5-60,bx,by); bgCx.strokeStyle=`rgba(95,168,112,${pulse})`; bgCx.lineWidth=.8; bgCx.stroke(); }
    bgCx.restore();
  }

  // S3: 夜明け地平線
  if(w3>0){
    bgCx.save(); bgCx.globalAlpha=w3;
    const horizon=H*.55;
    const sky2=bgCx.createLinearGradient(0,0,0,H); sky2.addColorStop(0,'#04060A'); sky2.addColorStop(.45,'#0A1520'); sky2.addColorStop(.55,'#1A2810'); sky2.addColorStop(.65,'#2A1A08'); sky2.addColorStop(1,'#06060A'); bgCx.fillStyle=sky2; bgCx.fillRect(0,0,W,H);
    const sunG=bgCx.createRadialGradient(W*.5,horizon,0,W*.5,horizon,W*.6); sunG.addColorStop(0,`rgba(200,160,64,${.18+.06*Math.sin(t*.4)})`); sunG.addColorStop(.3,'rgba(139,90,30,0.08)'); sunG.addColorStop(1,'rgba(0,0,0,0)'); bgCx.fillStyle=sunG; bgCx.fillRect(0,0,W,H);
    const hLine=bgCx.createLinearGradient(0,0,W,0); hLine.addColorStop(0,'rgba(200,160,64,0)'); hLine.addColorStop(.5,`rgba(200,160,64,${.4+.1*Math.sin(t*.5)})`); hLine.addColorStop(1,'rgba(200,160,64,0)'); bgCx.fillStyle=hLine; bgCx.fillRect(0,horizon-1,W,2);
    for(let i=0;i<18;i++){ const tx=i*W/17; const th=20+Math.sin(i*1.7)*15; bgCx.fillStyle='rgba(4,6,10,0.9)'; bgCx.fillRect(tx-3,horizon-th,6,th); }
    bgCx.restore();
  }

  // S4: 刃の光
  if(w4>0){
    bgCx.save(); bgCx.globalAlpha=w4;
    bgCx.fillStyle='#060408'; bgCx.fillRect(0,0,W,H);
    const redG=bgCx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.6); redG.addColorStop(0,'rgba(80,10,10,0.15)'); redG.addColorStop(1,'rgba(0,0,0,0)'); bgCx.fillStyle=redG; bgCx.fillRect(0,0,W,H);
    for(let i=0;i<12;i++){ const pulse=.5+.5*Math.sin(t*(.2+i*.05)+i); const bx=(i/12)*W+Math.sin(t*.3+i)*.05*W; const by=(Math.random()>.5?.3:.6)*H; const angle=-.4+i*.07; const len=80+i*10; const dx=Math.cos(angle)*len; const dy=Math.sin(angle)*len; const g=bgCx.createLinearGradient(bx,by,bx+dx,by+dy); g.addColorStop(0,`rgba(200,160,64,0)`); g.addColorStop(.5,`rgba(200,160,64,${.25*pulse})`); g.addColorStop(1,`rgba(200,160,64,0)`); bgCx.beginPath(); bgCx.moveTo(bx,by); bgCx.lineTo(bx+dx,by+dy); bgCx.strokeStyle=g; bgCx.lineWidth=2+pulse*1.5; bgCx.stroke(); }
    bgCx.restore();
  }

  // S5: 黒板
  if(w5>0){
    bgCx.save(); bgCx.globalAlpha=w5;
    const board=bgCx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7); board.addColorStop(0,'#0D1F12'); board.addColorStop(.7,'#081008'); board.addColorStop(1,'#04060A'); bgCx.fillStyle=board; bgCx.fillRect(0,0,W,H);
    for(let row=1;row<8;row++){ const y=row*(H/8); bgCx.beginPath(); bgCx.moveTo(W*.05,y); bgCx.lineTo(W*.95,y); bgCx.strokeStyle=`rgba(180,200,160,${.05+.02*Math.sin(t*.2+row)})`; bgCx.lineWidth=1; bgCx.stroke(); }
    const formulas=['E=mc²','∫f(x)dx','∑','lim→∞','∂y/∂x','F=ma']; bgCx.font=`${14+W*.01}px 'Space Mono',monospace`; formulas.forEach((f,i)=>{ bgCx.fillStyle=`rgba(200,220,180,${.07+.03*Math.sin(t*.4+i)})`; bgCx.fillText(f,(0.08+i*.15)*W,(0.15+i*.08)*H); });
    bgCx.restore();
  }

  // 共通パーティクル
  drawParticles(t);
}

// テーママップ
const bgRenderers = {
  shingeki: drawShingeki,
  // 他のテーマはここに追加
};

/* ════════════════════════════════════════
   6. GSAPアニメーション
════════════════════════════════════════ */
function initGSAP(d){
  gsap.registerPlugin(ScrollTrigger);

  ScrollTrigger.scrollerProxy(scroller,{
    scrollTop(v){ if(arguments.length) scroller.scrollTop=v; return scroller.scrollTop; },
    getBoundingClientRect(){ return{top:0,left:0,width:innerWidth,height:innerHeight}; },
    pinType:'transform'
  });
  scroller.addEventListener('scroll',ScrollTrigger.update);
  ScrollTrigger.defaults({scroller});

  const progressEl=document.getElementById('progress');
  const slideNumEl=document.getElementById('slide-num');
  const hintEl=document.getElementById('scroll-hint');

  // プログレスバー
  ScrollTrigger.create({
    trigger:'#slides',start:'top top',end:'bottom bottom',
    onUpdate(self){
      progressEl.style.width=(self.progress*100)+'%';
      const cur=Math.round(self.progress*5)+1;
      slideNumEl.textContent=String(cur).padStart(2,'0')+' / 06';
      hintEl.style.opacity=self.progress>.05?'0':'1';
    }
  });

  // S0 初期アニメ
  gsap.set('.s0-en',{scale:1.4,filter:'blur(20px) brightness(3)'});
  gsap.set(['.s-classify','.s0-ja','.s0-vow'],{y:20});
  gsap.set('.wings-svg',{scale:0.6});
  gsap.timeline({defaults:{ease:'power3.out'}})
    .to('.s-classify',{opacity:1,y:0,duration:0.7},0.3)
    .to('.wings-svg',{opacity:1,scale:1,duration:0.8,ease:'back.out(1.5)'},0.7)
    .to('.s0-en',{opacity:1,scale:1,filter:'blur(0px) brightness(1)',duration:1,ease:'power4.out'},1.1)
    .to('.s0-ja',{opacity:1,y:0,duration:0.7},1.7)
    .to('.s0-vow',{opacity:1,y:0,duration:0.7},2.1);

  gsap.to('.s0-en',{yPercent:18,ease:'none',scrollTrigger:{trigger:'#s0',start:'top top',end:'bottom top',scrub:true}});
  gsap.to('.s0-ja',{yPercent:10,ease:'none',scrollTrigger:{trigger:'#s0',start:'top top',end:'bottom top',scrub:true}});
  gsap.to('.wings-svg',{yPercent:6,ease:'none',scrollTrigger:{trigger:'#s0',start:'top top',end:'bottom top',scrub:true}});

  // S1
  gsap.set('#s1-label',{y:10}); gsap.set('.s1-sub',{y:20});
  ScrollTrigger.create({trigger:'#s1',start:'top 60%',once:true,onEnter(){
    gsap.timeline()
      .to('#s1-label',{opacity:1,y:0,duration:0.5})
      .to('.s1-big .word-inner',{y:0,duration:0.7,stagger:0.12,ease:'power3.out'},'<0.1')
      .to('.s1-sub',{opacity:1,y:0,duration:0.7},'<0.4');
  }});

  // S2
  gsap.set('.s2-header',{y:16});
  ScrollTrigger.create({trigger:'#s2',start:'top 60%',once:true,onEnter(){
    gsap.timeline()
      .to('.s2-header',{opacity:1,y:0,duration:0.5})
      .to('.sk',{opacity:1,scale:1,duration:0.5,stagger:{amount:0.7},ease:'back.out(1.3)'},'<0.2');
  }});

  // S3
  gsap.set('#s3-label',{y:10});
  ScrollTrigger.create({trigger:'#s3',start:'top 60%',once:true,onEnter(){
    gsap.timeline()
      .to('#s3-label',{opacity:1,y:0,duration:0.5})
      .to('.tl-row',{opacity:1,x:0,duration:0.55,stagger:0.1,ease:'power2.out'},'<0.2');
  }});

  // S4
  gsap.set('#s4-label',{y:10}); gsap.set('.req-kinetic',{y:30,scale:0.8});
  ScrollTrigger.create({trigger:'#s4',start:'top 60%',once:true,onEnter(){
    gsap.timeline()
      .to('#s4-label',{opacity:1,y:0,duration:0.5})
      .to('.req-row',{opacity:1,x:0,duration:0.55,stagger:0.12,ease:'power2.out'},'<0.2')
      .to('.req-kinetic',{opacity:1,y:0,scale:1,duration:0.8,ease:'elastic.out(1,0.6)'},'<0.6');
  }});

  // S5
  gsap.set('.s5-big',{scale:1.5,filter:'blur(24px) brightness(3)'});
  gsap.set(['.s5-pre','.s5-body','.s5-ja','.s5-vow','.s5-next'],{y:18});
  gsap.set('.s5-wings',{scale:0.6});
  ScrollTrigger.create({trigger:'#s5',start:'top 60%',once:true,onEnter(){
    gsap.timeline({defaults:{ease:'power3.out'}})
      .to('.s5-pre',{opacity:1,y:0,duration:0.5})
      .to('.s5-body',{opacity:1,y:0,duration:0.7},'<0.2')
      .to('.s5-big',{opacity:1,scale:1,filter:'blur(0px) brightness(1)',duration:1.1,ease:'power4.out'},'<0.4')
      .to('.s5-ja',{opacity:1,y:0,duration:0.6},'<0.6')
      .to('.s5-wings',{opacity:1,scale:1,duration:0.8,ease:'back.out(1.5)'},'<0.2')
      .to('.s5-vow',{opacity:1,duration:0.6},'<0.3')
      .to('.s5-next',{opacity:1,y:0,duration:0.6},'<0.2');
    gsap.to('.s5-wings',{y:-8,duration:2,ease:'sine.inOut',yoyo:true,repeat:-1,delay:1});
  }});

  ScrollTrigger.refresh();
}

/* ════════════════════════════════════════
   7. メインレンダーループ
════════════════════════════════════════ */
let renderFn = null;
let t = 0;
function renderLoop(){
  t += 0.016;
  if(renderFn) renderFn(slideRatio, t);
  requestAnimationFrame(renderLoop);
}

/* ════════════════════════════════════════
   8. 起動
════════════════════════════════════════ */
(async () => {
  try {
    const data = await loadData();
    buildDOM(data);
    initParticles(
      data.color_primary.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(','),
      data.color_accent.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',')
    );
    renderFn = bgRenderers[data.bg_theme] || drawShingeki;
    renderLoop();
    initGSAP(data);

    // ローディング非表示
    setTimeout(()=>{
      document.getElementById('loading').classList.add('hidden');
    }, 400);
  } catch(e) {
    console.error(e);
    document.getElementById('loading').innerHTML = '<span style="color:#CC3333">ERROR: データが読み込めません</span>';
  }
})();
</script>
